services:
  - name: erp-backend
    region: singapore
    repo: https://github.com/huaangdou-afk/erp-system
    branch: main
    type: web
    runtime: node
    rootDir: src/server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    autoDeploy: true
    plan: free
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

  - name: erp-frontend
    region: singapore
    repo: https://github.com/huaangdou-afk/erp-system
    branch: main
    type: web
    runtime: node
    rootDir: src/client
    buildCommand: npm install && npm run build
    startCommand: node server.cjs
    autoDeploy: true
    plan: free
    numInstances: 1
    envVars:
      - key: VITE_API_URL
        value: https://erp-backend.onrender.com
        sync: false
